apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: git-creds
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: image-updater-secretstore
    kind: SecretStore
  target:
    name: git-creds
  data:
    - secretKey: sshPrivateKey
      remoteRef:
        key: aurelia/image-updater/git-ssh-key
