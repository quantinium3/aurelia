      writeBackConfig:
        gitConfig:
          writeBackTarget: "helmvalues:/helm/recommendationservice/values.yaml"

    - namePattern: "shippingservice"
      images:
        - alias: shippingservice
          imageName: "253260001114.dkr.ecr.ap-south-1.amazonaws.com/shippingservice"
          manifestTargets:
            helm:
              name: "image.repository"
              tag: "image.tag"
      writeBackConfig:
        gitConfig:
          writeBackTarget: "helmvalues:/helm/shippingservice/values.yaml"
