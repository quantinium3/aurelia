name: adservice

on:
  push:
    branches:
      - master
    paths:
      - "src/adservice/**"
  workflow_dispatch:

jobs:
  build:
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/_build-template.yaml
    with:
      service_name: adservice
      context_path: src/adservice
