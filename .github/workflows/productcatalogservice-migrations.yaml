name: productcatalogservice-migrations

on:
  push:
    branches:
      - master
    paths:
      - "src/productcatalogservice/migrations/**"
  workflow_dispatch:

jobs:
  build:
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/_build-template.yaml
    with:
      service_name: productcatalogservice-migrations
      context_path: src/productcatalogservice/migrations
