name: terraform

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to run against
        type: choice
        options:
          - dev
          - prod
          - shared
        required: true
      action:
        description: Terraform action
        type: choice
        options:
          - plan
          - apply
        required: true
      runner:
        description: Runner (github-hosted for infra; self-hosted label for the cluster/addons phase)
        type: choice
        options:
          - github-hosted
          - aurelia-dev
          - aurelia-prod
        default: github-hosted
        required: true
      cleanup_namespace:
        description: Optional - delete this namespace before terraform (clears a stuck helm release)
        type: string
        default: ""
        required: false

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    runs-on: ${{ inputs.runner == 'github-hosted' && fromJSON('["ubuntu-latest"]') || fromJSON(format('["self-hosted", "{0}"]', inputs.runner)) }}
    env:
      TF_VAR_alarm_notification_email: ${{ secrets.TF_VAR_alarm_notification_email }}
    defaults:
      run:
        working-directory: terraform/environments/${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.TF_AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.5
          terraform_wrapper: false

      - name: Pre-cleanup stuck namespace
        if: ${{ inputs.cleanup_namespace != '' }}
        run: |
          aws eks update-kubeconfig --name aurelia-${{ inputs.environment }} --region ${{ vars.AWS_REGION }}
          kubectl delete namespace ${{ inputs.cleanup_namespace }} --ignore-not-found --wait=true

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform plan
        run: terraform plan -input=false -out=tfplan

      - name: Terraform apply
        if: ${{ inputs.action == 'apply' }}
        run: terraform apply -input=false tfplan
