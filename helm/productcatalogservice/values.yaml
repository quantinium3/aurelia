name: product-catalog-service
image:
  repository: 253260001114.dkr.ecr.ap-south-1.amazonaws.com/productcatalogservice
  tag: 6a9a5a009e235a4c4ef0a261f7706e7c1d64cafb
port: 3000
postgres:
  region: ap-south-1
  addr: &postgresAddr "productcatalog-db.internal.himanshu.dev:5432"
  databaseName: &postgresDatabaseName productcatalog
  tableName: &postgresTableName products
migration:
  image:
    repository: 253260001114.dkr.ecr.ap-south-1.amazonaws.com/productcatalogservice-migrations
    tag: 6a9a5a009e235a4c4ef0a261f7706e7c1d64cafb
env:
- name: PORT
  value: "3000"
- name: POSTGRES_ADDR
  value: *postgresAddr
- name: POSTGRES_DATABASE_NAME
  value: *postgresDatabaseName
- name: POSTGRES_TABLE_NAME
  value: *postgresTableName
- name: POSTGRES_PASSWORD
  valueFrom:
    secretKeyRef:
      name: product-catalog-service-db-credentials
      key: password
